version: '3.8'

services:
  ml-bootcamp-portal:
    build: .
    container_name: ml-bootcamp-portal
    ports:
      - "8585:8585"
    environment:
      - COURSES_DIR=/app/Courses
      - PORT=8585
    volumes:
      # Bind-mount: maps host Courses folder directly into container.
      # Files added/uploaded on either side are immediately visible on both.
      - ./Courses:/app/Courses
    restart: unless-stopped
